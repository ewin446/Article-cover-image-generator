<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宝宝取名工具（懒加载+随机化版）</title>
  <!-- 引入样式文件 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <h1>宝宝高分取名定制工具</h1>
      <p>结合生辰/生肖/五行，随机生成专属高分名字</p>
    </header>

    <!-- 输入区域 -->
    <section class="input-area">
      <div class="form-group">
        <label for="surname">宝宝姓氏：</label>
        <input type="text" id="surname" placeholder="请输入单字姓（如：李、张）" required>
      </div>
      <div class="form-group">
        <label for="birth-date">出生日期：</label>
        <input type="date" id="birth-date" required>
      </div>
      <div class="form-group">
        <label for="gender">宝宝性别：</label>
        <select id="gender" required>
          <option value="">请选择</option>
          <option value="girl">女宝</option>
          <option value="boy">男宝</option>
        </select>
      </div>
      <div class="form-group">
        <label for="count">生成数量：</label>
        <select id="count">
          <option value="10">10个</option>
          <option value="30">30个</option>
          <option value="50">50个</option>
        </select>
      </div>
      <!-- 高级设置 -->
      <div class="advanced-setting">
        <button id="advanced-btn">⚙️ 高级设置</button>
        <div class="advanced-panel" id="advanced-panel">
          <div class="form-group">
            <label for="zodiac-weight">生肖匹配权重：</label>
            <input type="range" id="zodiac-weight" min="0" max="100" value="70">
            <span id="zodiac-weight-val">70%</span>
          </div>
          <div class="form-group">
            <label for="season-weight">季节匹配权重：</label>
            <input type="range" id="season-weight" min="0" max="100" value="50">
            <span id="season-weight-val">50%</span>
          </div>
          <div class="form-group">
            <label for="element-weight">五行匹配权重：</label>
            <input type="range" id="element-weight" min="0" max="100" value="80">
            <span id="element-weight-val">80%</span>
          </div>
          <button id="reset-weight">重置为默认权重</button>
        </div>
      </div>
      <button id="generate-btn">生成高分名字推荐</button>
    </section>

    <!-- 加载动画（懒加载/生成中） -->
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p id="loading-text">正在为您生成个性化好名字...</p>
    </div>

    <!-- 筛选区域 -->
    <section class="filter-area" id="filter-area" style="display: none;">
      <button class="filter-btn" data-score="95">95分以上</button>
      <button class="filter-btn" data-score="92">92-94分</button>
      <button class="filter-btn" data-score="90">90-91分</button>
      <button class="filter-btn" data-score="all">全部</button>
    </section>

    <!-- 名字结果区域（懒加载容器） -->
    <section class="result-area" id="result-area">
      <div class="name-list" id="name-list"></div>
    </section>

    <!-- 收藏区域 -->
    <section class="collection-area" id="collection-area" style="display: none;">
      <h3>我的收藏 <span id="collection-count">(0)</span></h3>
      <div class="collection-list" id="collection-list"></div>
    </section>
  </div>

  <!-- 引入工具函数和核心逻辑 -->
  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
