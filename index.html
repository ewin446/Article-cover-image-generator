<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宝宝取名系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", sans-serif;
    }
    body {
      background: #f5f7fa;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    .form-item {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
    }
    .generate-btn {
      width: 100%;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      margin: 20px 0;
    }
    .result-area {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    .result-area h2 {
      color: #333;
      margin-bottom: 15px;
      font-size: 20px;
    }
    .name-list {
      display: grid;
      gap: 10px;
    }
    .name-card {
      padding: 15px;
      border: 1px solid #eee;
      border-radius: 6px;
    }
    .name-text {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
    }
    .meaning-text {
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>宝宝取名智能定制系统</h1>

    <!-- 核心输入项 -->
    <div class="form-item">
      <label for="surname">宝宝姓氏：</label>
      <input type="text" id="surname" placeholder="请输入姓氏（如：李、王）" maxlength="2">
    </div>

    <div class="form-item">
      <label for="gender">宝宝性别：</label>
      <select id="gender">
        <option value="girl">女宝</option>
        <option value="boy">男宝</option>
      </select>
    </div>

    <!-- 生成按钮 -->
    <button class="generate-btn" onclick="generateNames()">生成定制好名</button>

    <!-- 结果展示 -->
    <div class="result-area" id="resultArea" style="display: none;">
      <h2>为您生成的高分好名</h2>
      <div class="name-list" id="nameList"></div>
    </div>
  </div>

  <script>
    // 最简单的名字数据库（无复杂嵌套，避免访问错误）
    const nameData = {
      girl: [
        { name: "婉清", meaning: "温婉清丽，如清风拂面，寓意女子温柔贤淑" },
        { name: "静姝", meaning: "静女其姝，寓意女子安静美好，品德端庄" },
        { name: "采薇", meaning: "寓意女子坚韧不拔，品性高洁" },
        { name: "思悠", meaning: "寓意女子心思细腻，温婉悠长" },
        { name: "清芷", meaning: "寓意女子品性高洁，气质如兰" },
        { name: "一诺", meaning: "一诺千金，寓意女子诚实守信" },
        { name: "语桐", meaning: "寓意女子活泼开朗，生命力旺盛" },
        { name: "梓萱", meaning: "寓意女子茁壮成长，快乐无忧" },
        { name: "欣怡", meaning: "寓意女子生活幸福，心情舒畅" },
        { name: "若溪", meaning: "寓意女子纯净自然，活泼灵动" }
      ],
      boy: [
        { name: "子谦", meaning: "君子谦谦，寓意男子谦逊有礼，品德高尚" },
        { name: "修远", meaning: "路漫漫其修远兮，寓意男子追求远大，坚持不懈" },
        { name: "景行", meaning: "寓意男子品行高尚，令人敬仰" },
        { name: "博文", meaning: "寓意男子学识渊博，知书达理" },
        { name: "怀瑾", meaning: "寓意男子身怀美玉，品德高尚" },
        { name: "浩然", meaning: "浩然正气，寓意男子胸怀坦荡，一身正气" },
        { name: "宇辰", meaning: "气宇轩昂，寓意男子心胸开阔，前程远大" },
        { name: "泽宇", meaning: "恩泽万物，寓意男子善良宽厚，风度翩翩" },
        { name: "俊熙", meaning: "寓意男子相貌堂堂，前途光明" },
        { name: "奕辰", meaning: "寓意男子精神饱满，光芒四射" }
      ]
    };

    // 核心生成函数（无任何复杂逻辑，确保不报错）
    function generateNames() {
      // 1. 获取输入值
      const surname = document.getElementById('surname').value.trim();
      const gender = document.getElementById('gender').value;

      // 2. 校验姓氏
      if (!surname) {
        alert('请输入宝宝姓氏！');
        return;
      }

      // 3. 获取对应性别名字
      const names = nameData[gender];
      if (!names) {
        alert('数据加载失败！');
        return;
      }

      // 4. 渲染结果
      const resultArea = document.getElementById('resultArea');
      const nameList = document.getElementById('nameList');
      
      // 清空旧结果
      nameList.innerHTML = '';
      // 显示结果区域
      resultArea.style.display = 'block';

      // 5. 生成10个名字卡片
      names.forEach(item => {
        const fullName = surname + item.name;
        const card = document.createElement('div');
        card.className = 'name-card';
        card.innerHTML = `
          <div class="name-text">${fullName}（95分）</div>
          <div class="meaning-text">寓意：${item.meaning}</div>
        `;
        nameList.appendChild(card);
      });
    }
  </script>
</body>
</html>
